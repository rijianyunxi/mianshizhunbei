<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor SDK Test</title>
  <script defer src="bundle.js"></script></head>
  <body>
    <h1>Monitor SDK Test Panel</h1>

    <h2>Error Test</h2>
    <button onclick="createJSError()">JS Error</button>
    <button onclick="createResourceError()">Resource Error</button>
    <button onclick="createUnhandledRejection()">Unhandled Rejection</button>

    <h2>Fetch Test</h2>
    <button onclick="testFetch404()">Fetch 404</button>
    <button onclick="testFetchNetworkError()">Fetch Network Error</button>

    <h2>Axios Test</h2>
    <button onclick="testAxios404()">Axios 404</button>
    <button onclick="testAxiosNetworkError()">Axios Network Error</button>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
      function createJSError() {
        console.log(a);
        let a = 1;
      }

      function createUnhandledRejection() {
        Promise.resolve(1).then(() => {
          console.log(1 + c);
        });
      }

      function createResourceError() {
        const img = document.createElement("img");
        img.src = "https://example.invalid/not-found.png";
        document.body.appendChild(img);
      }

      async function testFetch404() {
        try {
          const res = await fetch(
            "https://jsonplaceholder.typicode.com/not-found",
          );
          console.log("fetch 404 status:", res.status);
        } catch (error) {
          console.error("fetch 404 error:", error);
        }
      }

      async function testFetchNetworkError() {
        try {
          await fetch("https://example.invalid/api");
        } catch (error) {
          console.error("fetch network error:", error);
        }
      }

      async function testAxios404() {
        if (!window.axios) {
          console.error("axios is not loaded");
          return;
        }

        try {
          await window.axios.get(
            "https://jsonplaceholder.typicode.com/not-found",
          );
        } catch (error) {
          console.error("axios 404 error:", error);
        }
      }

      async function testAxiosNetworkError() {
        if (!window.axios) {
          console.error("axios is not loaded");
          return;
        }

        try {
          await window.axios.get("https://example.invalid/api");
        } catch (error) {
          console.error("axios network error:", error);
        }
      }
    </script>
  </body>
</html>
